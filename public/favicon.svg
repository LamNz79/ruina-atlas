<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background: dark book silhouette -->
  <!-- Left book wing -->
  <path d="M8 12 Q4 12 4 16 L4 48 Q4 52 8 52 L28 52 Q32 52 32 48 L32 16 Q32 12 28 12 Z" fill="#1a0a0a"/>
  <!-- Right book wing -->
  <path d="M56 12 Q60 12 60 16 L60 48 Q60 52 56 52 L36 52 Q32 52 32 48 L32 16 Q32 12 36 12 Z" fill="#1a0a0a"/>
  <!-- Book spine / center -->
  <rect x="28" y="10" width="8" height="44" rx="2" fill="#b8202f"/>

  <!-- Compass rose: 8 sharp arms -->
  <g transform="translate(32, 32)">
    <!-- N arm -->
    <polygon points="0,-18 3,-8 -3,-8" fill="#b8202f"/>
    <!-- S arm -->
    <polygon points="0,18 3,8 -3,8" fill="#b8202f"/>
    <!-- E arm -->
    <polygon points="18,0 8,3 8,-3" fill="#b8202f"/>
    <!-- W arm -->
    <polygon points="-18,0 -8,3 -8,-3" fill="#b8202f"/>
    <!-- NE arm -->
    <polygon points="13,-13 5,-6 6,-5" fill="#8a1520"/>
    <!-- NW arm -->
    <polygon points="-13,-13 -6,-5 -5,-6" fill="#8a1520"/>
    <!-- SE arm -->
    <polygon points="13,13 5,6 6,5" fill="#8a1520"/>
    <!-- SW arm -->
    <polygon points="-13,13 -5,6 -6,5" fill="#8a1520"/>

    <!-- Inner compass circle -->
    <circle cx="0" cy="0" r="5" fill="#b8202f"/>
    <!-- Compass center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#f5c518"/>
  </g>

  <!-- Constellation nodes: gold dots -->
  <circle cx="14" cy="18" r="2" fill="#f5c518"/>
  <circle cx="50" cy="18" r="2" fill="#f5c518"/>
  <circle cx="14" cy="46" r="2" fill="#f5c518"/>
  <circle cx="50" cy="46" r="2" fill="#f5c518"/>
  <circle cx="20" cy="14" r="1.5" fill="#f5c518"/>
  <circle cx="44" cy="14" r="1.5" fill="#f5c518"/>
  <circle cx="20" cy="50" r="1.5" fill="#f5c518"/>
  <circle cx="44" cy="50" r="1.5" fill="#f5c518"/>

  <!-- Constellation connecting lines -->
  <line x1="14" y1="18" x2="20" y2="14" stroke="#f5c518" stroke-width="0.8" opacity="0.7"/>
  <line x1="50" y1="18" x2="44" y2="14" stroke="#f5c518" stroke-width="0.8" opacity="0.7"/>
  <line x1="14" y1="46" x2="20" y2="50" stroke="#f5c518" stroke-width="0.8" opacity="0.7"/>
  <line x1="50" y1="46" x2="44" y2="50" stroke="#f5c518" stroke-width="0.8" opacity="0.7"/>

  <!-- Book cover highlights / border lines -->
  <path d="M10 14 Q6 14 6 18 L6 46 Q6 50 10 50" fill="none" stroke="#b8202f" stroke-width="1.2"/>
  <path d="M54 14 Q58 14 58 18 L58 46 Q58 50 54 50" fill="none" stroke="#b8202f" stroke-width="1.2"/>
</svg>
