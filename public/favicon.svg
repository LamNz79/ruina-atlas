<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark book silhouette background -->
  <path d="M4 14 Q4 10 8 10 L26 10 Q30 10 30 14 L30 50 Q30 54 26 54 L8 54 Q4 54 4 50 Z" fill="#1a0a0a"/>
  <path d="M60 14 Q60 10 56 10 L38 10 Q34 10 34 14 L34 50 Q34 54 38 54 L56 54 Q60 54 60 50 Z" fill="#1a0a0a"/>

  <!-- Bold compass rose (simplified for 16px readability) -->
  <g transform="translate(32, 32)">
    <!-- Main 4 arms (larger, bolder) -->
    <polygon points="0,-20 4,-8 -4,-8" fill="#b8202f"/>
    <polygon points="0,20 4,8 -4,8" fill="#b8202f"/>
    <polygon points="20,0 8,4 8,-4" fill="#b8202f"/>
    <polygon points="-20,0 -8,4 -8,-4" fill="#b8202f"/>
    <!-- Secondary 4 arms (smaller) -->
    <polygon points="14,-14 6,-6 -6,-6" fill="#8a1520"/>
    <polygon points="-14,-14 -6,-6 6,-6" fill="#8a1520"/>
    <polygon points="14,14 6,6 -6,6" fill="#8a1520"/>
    <polygon points="-14,14 -6,6 6,6" fill="#8a1520"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="6" fill="#b8202f"/>
    <!-- Gold center dot (prominent at all sizes) -->
    <circle cx="0" cy="0" r="3" fill="#f5c518"/>
  </g>
</svg>
