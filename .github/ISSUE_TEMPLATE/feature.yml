name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### Thanks for suggesting a feature!

        Please search existing issues first — your idea may already be tracked.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see added or changed?
      placeholder: "Describe the feature in detail..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why does this matter?
      description: What problem does it solve or what value does it add?
      placeholder: "This matters because..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
      placeholder: "I considered..."

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: "It affects the lore graph / data layer"
        - label: "It affects the UI / UX"
        - label: "It affects data accuracy (a correction)"
        - label: "Unsure — needs discussion"
